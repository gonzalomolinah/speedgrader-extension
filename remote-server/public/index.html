<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Corrector Canvas Remoto</title>
    <link rel="stylesheet" href="/remote.css">
  </head>
  <body>
    <main class="remote-shell">
      <header class="remote-header">
        <div>
          <h1>Corrector Canvas</h1>
          <p id="connectionText">Desconectado</p>
        </div>
        <strong id="totalValue" class="total-value">0</strong>
      </header>

      <section class="actions-bar">
        <button id="editButton" type="button" aria-pressed="false" disabled>Editar pauta</button>
        <button id="insertButton" type="button" disabled>Ingresar en rubrica</button>
        <button id="clearButton" type="button" disabled>Limpiar</button>
      </section>

      <section id="statusPanel" class="status-text"></section>
      <form id="addSectionForm" class="edit-panel" hidden>
        <input id="sectionNameInput" type="text" placeholder="Nueva seccion" aria-label="Nombre de la nueva seccion">
        <button id="addSectionButton" type="submit" disabled>Agregar seccion</button>
      </form>
      <section id="sectionsList" class="sections-list"></section>
    </main>

    <script src="/remote.js"></script>
  </body>
</html>
